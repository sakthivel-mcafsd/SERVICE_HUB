<div class="container mt-4">

  <h3 class="page-title">My Assigned Bookings</h3>

  <div class="row">
    <div class="col-md-6" *ngFor="let booking of bookings">

      <div class="booking-card assigned shadow-sm">

        <div class="d-flex justify-content-between align-items-center">
          <h5>{{ booking.serviceType }}</h5>
          <span class="badge bg-primary">Assigned</span>
        </div>

        <p><b>Customer:</b> {{ booking.customerName }}</p>
        <p>{{ booking.description }}</p>

        <div class="d-flex justify-content-between align-items-center">
          <small>{{ booking.date }} | {{ booking.time }}</small>

          <button class="btn btn-primary"
                  (click)="completeBooking(booking.id)">
            Mark as Completed
          </button>
        </div>

      </div>

    </div>
  </div>

</div>
