<div class="container mt-4">

  <h3 class="page-title">Available Bookings</h3>

  <div class="row">
    <div class="col-md-6" *ngFor="let booking of bookings">

      <div class="booking-card shadow-sm">

        <div class="d-flex justify-content-between align-items-center">
          <h5>{{ booking.serviceType }}</h5>
          <span class="badge bg-warning text-dark">Pending</span>
        </div>

        <p><b>Customer:</b> {{ booking.customerName }}</p>
        <p>{{ booking.description }}</p>

        <div class="d-flex justify-content-between align-items-center">
          <small>{{ booking.date }} | {{ booking.time }}</small>

          <button class="btn btn-success"
                  (click)="acceptBooking(booking.id)">
            Accept
          </button>
        </div>

      </div>

    </div>
  </div>

</div>
