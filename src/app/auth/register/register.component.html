<div class="register-wrapper">
   <!-- Register page -->
  <div class="brand text-center mb-4">
    <div class="logo">
      <img src="assets\Logo.png"
           alt="LOGO"
           id="logo_img">
    </div>
    <h2 class="fw-bold mt-2">ServiceHub</h2>
    <p class="text-muted">Join our platform today</p>
  </div>

  <div class="container d-flex justify-content-center align-items-center text-capitalize">
    <div class="card card-box1">
      <div class="card-body">
        <form [formGroup]="fg" (ngSubmit)="onSubmit()">
          <h5 class="invite">Create Account</h5>

          <div class="mt-4">

            <!-- ✅ Name -->
            <div>
              <label>Full Name</label>
              <input
                type="text"
                class="form-control mt-2"
                placeholder="Sakthivel"
                formControlName="name"
                [ngClass]="{'is-invalid': fg.get('name')?.invalid && fg.get('name')?.touched}"
              />
              <div class="invalid-feedback">
                Please enter name
              </div>
            </div>

            <!-- ✅ Email -->
            <div class="mt-3">
              <label>Email Address</label>
              <input
                type="text"
                class="form-control mt-2"
                placeholder="email@gmail.com"
                formControlName="email"
                [ngClass]="{'is-invalid': fg.get('email')?.invalid && fg.get('email')?.touched}"
              />
              <div class="invalid-feedback">
                Please enter email
              </div>
            </div>

            <!-- ✅ Password -->
            <div class="mt-3">
              <label>Password</label>
              <input
                type="password"
                class="form-control mt-2"
                placeholder="••••••••"
                formControlName="password"
                [ngClass]="{'is-invalid': fg.get('password')?.invalid && fg.get('password')?.touched}"
              />
              <div class="invalid-feedback">
                Please enter password
              </div>
            </div>

            <!-- ✅ Role Selection -->
            <div class="mt-3">
              <label>Register As</label>

              <div class="mt-2 buttons">
                <button
                  type="button"
                  class="button1"
                  (click)="setRole('customer')"
                  [class.active]="fg.value.role === 'customer'">
                  Customer
                </button>

                <button
                  type="button"
                  class="button1"
                  (click)="setRole('service')"
                  [class.active]="fg.value.role === 'service'">
                  Service Provider
                </button>
              </div>

              <small class="text-danger"
                *ngIf="fg.get('role')?.invalid && fg.get('role')?.touched">
                Please select register type
              </small>
            </div>

            <!-- ✅ Submit -->
            <div class="mt-4">
                <button type="submit" class="form-control mt-3 btn-flex" [disabled]="isLoading">
                      
                        <span *ngIf="!isLoading" class="material-symbols-outlined">
                          person_add
                        </span>
                      
                        <span class="ps-2">
                          {{ isLoading ? 'Creating...' : 'Create Account' }}
                        </span>
                </button>
            </div>

          </div>

          <div class="mt-3 text-center">
            <p class="bottom_nav">
              Already have an account?
              <a routerLink="/login" class="text-decoration-none bottom_nav">
                Login here
              </a>
            </p>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
